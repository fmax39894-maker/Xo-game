<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XO Online Multiplayer</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
}

/* buttons */

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
color:white;
font-weight:bold;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

button:hover{
transform:scale(1.05);
}

/* inputs */

input{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
}

/* top bar */

#topBar{
display:flex;
justify-content:space-between;
padding:10px;
background:linear-gradient(90deg,#ff9966,#ff5e62);
}

/* lists */

.listBox{
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
margin:10px;
}

/* board */

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.cell{
width:100px;
height:100px;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(145deg,#232526,#414345);
border-radius:10px;
cursor:pointer;
}

/* chat */

#messages{
height:120px;
overflow:auto;
background:black;
padding:5px;
margin-bottom:5px;
}

#winnerAnim{
font-size:22px;
margin-top:10px;
color:yellow;
}

</style>
</head>

<body>

<!-- HOME SCREEN -->

<div id="home">

<div id="topBar">

<div>
<input id="nameInput" placeholder="Enter name">
<button onclick="setName()">Save</button>
</div>

<div>
<button id="onlineBtn" onclick="toggleOnline()">Go Online</button>
</div>

</div>

<h2>XO Online Lobby</h2>

<div>

<input id="joinCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<br>

<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>

</div>

<h3>Online Players</h3>
<div id="playersList" class="listBox"></div>

<h3>Friend Requests</h3>
<div id="requestList" class="listBox"></div>

<h3>Friends</h3>
<div id="friendsList" class="listBox"></div>

<h3>Live Rooms</h3>
<div id="roomsList" class="listBox"></div>

</div>

<!-- GAME SCREEN -->

<div id="game" style="display:none">

<div id="topBar">

<div>
<span id="p1Name"></span>
Score: <span id="p1Score">0</span>
</div>

<div>
<button onclick="leaveRoom()">Leave</button>
</div>

<div>
<span id="p2Name"></span>
Score: <span id="p2Score">0</span>
</div>

</div>

<h3 id="turnLabel">Turn</h3>

<div class="board">

<div class="cell" onclick="move(0)"></div>
<div class="cell" onclick="move(1)"></div>
<div class="cell" onclick="move(2)"></div>

<div class="cell" onclick="move(3)"></div>
<div class="cell" onclick="move(4)"></div>
<div class="cell" onclick="move(5)"></div>

<div class="cell" onclick="move(6)"></div>
<div class="cell" onclick="move(7)"></div>
<div class="cell" onclick="move(8)"></div>

</div>

<div id="winnerAnim"></div>

<h3>Chat</h3>

<div id="messages"></div>

<input id="chatInput" placeholder="message">
<button onclick="sendMsg()">Send</button>

</div>

<script>

/* FIREBASE CONFIG */

var firebaseConfig={
  apiKey: "AIzaSyBs6mBAEN3ZhFfeA_Kd4UJlHUZNEp3TcYg",
  authDomain: "tic-tac-rot.firebaseapp.com",
  databaseURL: "https://tic-tac-rot-default-rtdb.firebaseio.com",
  projectId: "tic-tac-rot"
}

firebase.initializeApp(firebaseConfig)

var db=firebase.database()

/* PLAYER */

var playerId="p"+Math.random().toString(36).substr(2,9)
var playerName=""
var roomId=null
var turn="X"

/* SET NAME */

function setName(){

playerName=document.getElementById("nameInput").value

}

/* ONLINE SYSTEM */

function toggleOnline(){

var btn=document.getElementById("onlineBtn")

if(btn.innerText=="Go Online"){

db.ref("players/"+playerId).set({
name:playerName
})

btn.innerText="Go Offline"

listenPlayers()
listenRequests()
listenFriends()

}else{

db.ref("players/"+playerId).remove()

btn.innerText="Go Online"

}

}

/* ONLINE PLAYERS */

function listenPlayers(){

db.ref("players").on("value",snap=>{

var data=snap.val()
var html=""

for(var id in data){

if(id!=playerId){

html+="<div>"+data[id].name+

"<button onclick='sendRequest(\""+id+"\")'>Add Friend</button>"+

"<button onclick='invite(\""+id+"\")'>Invite</button>"+

"</div>"

}

}

document.getElementById("playersList").innerHTML=html

})

}

/* SEND FRIEND REQUEST */

function sendRequest(id){

db.ref("requests/"+id+"/"+playerId).set("pending")

}

/* LISTEN FRIEND REQUEST */

function listenRequests(){

db.ref("requests/"+playerId).on("value",snap=>{

var data=snap.val()
var html=""

for(var id in data){

html+="<div>"+id+

"<button onclick='acceptFriend(\""+id+"\")'>Accept</button>"+

"<button onclick='rejectFriend(\""+id+"\")'>Reject</button>"+

"</div>"

}

document.getElementById("requestList").innerHTML=html

})

}

/* ACCEPT */

function acceptFriend(id){

db.ref("friends/"+playerId+"/"+id).set(true)
db.ref("friends/"+id+"/"+playerId).set(true)

db.ref("requests/"+playerId+"/"+id).remove()

}

/* REJECT */

function rejectFriend(id){

db.ref("requests/"+playerId+"/"+id).remove()

}

/* FRIEND LIST */

function listenFriends(){

db.ref("friends/"+playerId).on("value",snap=>{

var data=snap.val()
var html=""

for(var id in data){

html+="<div>"+id+
"<button onclick='invite(\""+id+"\")'>Invite</button>"+
"</div>"

}

document.getElementById("friendsList").innerHTML=html

})

}

/* INVITE */

function invite(id){

alert("Invite sent!")

}

/* ROOMS */

function createRoom(){

var name=document.getElementById("roomName").value

if(!name) return alert("Enter room name")

roomId="r"+Math.random().toString(36).substr(2,6)

db.ref("rooms/"+roomId).set({
name:name,
players:{X:playerName},
board:["","","","","","","","",""],
turn:"X"
})

joinRoomById(roomId)

}

/* JOIN */

function joinRoom(){

var code=document.getElementById("joinCode").value
joinRoomById(code)

}

function joinRoomById(id){

db.ref("rooms/"+id+"/players/O").once("value",snap=>{

if(snap.exists()){
alert("Room full")
return
}

roomId=id

db.ref("rooms/"+id+"/players/O").set(playerName)

startGame()

})

}

/* ROOM LIST */

db.ref("rooms").on("value",snap=>{

var data=snap.val()
var html=""

for(var r in data){

var count=Object.keys(data[r].players).length

html+="<div>"+data[r].name+" ("+count+"/2)"+
"<button onclick='joinRoomById(\""+r+"\")'>Join</button>"+
"</div>"

}

document.getElementById("roomsList").innerHTML=html

})

/* GAME */

function startGame(){

document.getElementById("home").style.display="none"
document.getElementById("game").style.display="block"

db.ref("rooms/"+roomId).on("value",snap=>{

var data=snap.val()

var board=data.board

var cells=document.getElementsByClassName("cell")

for(var i=0;i<9;i++){
cells[i].innerText=board[i]
}

document.getElementById("p1Name").innerText=data.players.X
document.getElementById("p2Name").innerText=data.players.O

turn=data.turn

document.getElementById("turnLabel").innerText="Turn : "+turn

})

listenChat()

}

/* MOVE */

function move(i){

db.ref("rooms/"+roomId).once("value",snap=>{

var data=snap.val()

if(data.board[i]!="") return

data.board[i]=turn

turn=(turn=="X")?"O":"X"

db.ref("rooms/"+roomId).update({
board:data.board,
turn:turn
})

checkWinner(data.board)

})

}

/* WIN */

function checkWinner(b){

var wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
]

for(var w of wins){

if(b[w[0]] && b[w[0]]==b[w[1]] && b[w[1]]==b[w[2]]){

showWinner(b[w[0]])
return

}

}

if(!b.includes("")) showWinner("draw")

}

function showWinner(w){

var text=(w=="draw")?"Draw":w+" Wins!"

document.getElementById("winnerAnim").innerText=text

setTimeout(resetBoard,3000)

}

function resetBoard(){

db.ref("rooms/"+roomId+"/board").set(["","","","","","","","",""])

}

/* CHAT */

function sendMsg(){

var msg=document.getElementById("chatInput").value

db.ref("rooms/"+roomId+"/chat").push({
name:playerName,
msg:msg
})

document.getElementById("chatInput").value=""

}

function listenChat(){

db.ref("rooms/"+roomId+"/chat").on("child_added",snap=>{

var d=snap.val()

var div=document.createElement("div")

div.innerText=d.name+": "+d.msg

document.getElementById("messages").appendChild(div)

})

}

/* LEAVE */

function leaveRoom(){

if(!confirm("Leave room?")) return

location.reload()

}

</script>

</body>
</html>
