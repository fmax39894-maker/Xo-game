<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>XO Online</title>

<style>

/* GLOBAL */

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
height:100vh;
overflow:hidden;
}

button{
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

button:hover{
opacity:0.9;
}

input{
padding:8px;
border-radius:6px;
border:none;
outline:none;
}

/* LOBBY */

#lobby{
height:100vh;
display:flex;
flex-direction:column;
}

.top{
display:flex;
justify-content:space-between;
padding:12px;
background:#00000066;
}

.nameBox{
display:flex;
gap:10px;
}

/* margin between name and room create */

.roomCreate{
margin-left:20px;
display:flex;
gap:10px;
}

.main{
flex:1;
display:flex;
overflow:hidden;
}

.players{
width:35%;
background:#00000055;
padding:10px;
overflow:auto;
}

.player{
display:flex;
justify-content:space-between;
padding:6px;
margin-bottom:6px;
background:#ffffff11;
border-radius:6px;
}

.rooms{
flex:1;
padding:10px;
overflow:auto;
}

.room{
display:flex;
justify-content:space-between;
padding:6px;
margin-bottom:6px;
background:#ffffff11;
border-radius:6px;
}

.bottom{
display:flex;
justify-content:space-between;
padding:12px;
background:#00000066;
}

/* GAME */

#game{
display:none;
flex-direction:column;
height:100vh;
}

.gameTop{
display:flex;
justify-content:space-between;
padding:10px;
background:#00000066;
}

.playerBox{
text-align:center;
}

.turn{
font-size:18px;
margin-top:5px;
}

/* BOARD */

.board{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:10px;
}

.cell{
background:#ffffff22;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
border-radius:10px;
cursor:pointer;
}

/* CHAT */

.chat{
height:160px;
background:#00000066;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:6px;
}

.chatInput{
display:flex;
}

/* WIN ANIMATION */

#resultPopup{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:32px;
background:black;
padding:20px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>


<!-- LOBBY -->

<div id="lobby">

<div class="top">

<div class="nameBox">

<input id="name" placeholder="Enter name">
<button id="onlineBtn">Go Online</button>

</div>

</div>


<div class="main">

<div class="players">

<h3>Online Players</h3>
<div id="players"></div>

</div>


<div class="rooms">

<h3>Live Rooms</h3>
<div id="rooms"></div>

</div>

</div>


<div class="bottom">

<div>

<input id="joinCode" placeholder="Join room code">
<button onclick="joinByCode()">Join Room</button>

<br><br>

<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>

</div>

<span id="onlineCount"></span>

</div>

</div>


<!-- GAME -->

<div id="game">

<div class="gameTop">

<div class="playerBox">

<div id="p1"></div>
Score: <span id="s1">0</span>

</div>

<div>

Room: <span id="roomId"></span>
<br>
<button onclick="leaveRoom()">Leave</button>

</div>

<div class="playerBox">

<div id="p2"></div>
Score: <span id="s2">0</span>

</div>

</div>

<h2 id="turn"></h2>

<div class="board" id="board"></div>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="chatInput">

<input id="msg">
<button onclick="sendMsg()">Send</button>

</div>

</div>

</div>


<div id="resultPopup"></div>


<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getDatabase,ref,set,onValue,update,push,remove} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig={
  apiKey: "AIzaSyBs6mBAEN3ZhFfeA_Kd4UJlHUZNEp3TcYg",
  authDomain: "tic-tac-rot.firebaseapp.com",
  databaseURL: "https://tic-tac-rot-default-rtdb.firebaseio.com",
  projectId: "tic-tac-rot"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);


/* GLOBAL */

let playerId=Math.random().toString(36).slice(2);
let playerName="";
let online=false;
let roomId=null;
let symbol=null;
let scores={X:0,O:0};


/* ONLINE BUTTON */

document.getElementById("onlineBtn").onclick=function(){

if(!online){

playerName=document.getElementById("name").value || "Player";

set(ref(db,"online/"+playerId),{
name:playerName,
time:Date.now()
});

online=true;
this.innerText="Go Offline";

/* auto offline 1 min */

setTimeout(()=>{
goOffline();
},60000);

}else{

goOffline();

}

};


/* GO OFFLINE */

function goOffline(){

remove(ref(db,"online/"+playerId));
online=false;
document.getElementById("onlineBtn").innerText="Go Online";

}


/* ONLINE PLAYERS */

onValue(ref(db,"online"),snap=>{

let data=snap.val()||{};
let html="";
let count=0;

for(let id in data){

let p=data[id];
if(!p || !p.name) continue;

count++;

html+=`

<div class="player">

${p.name}

<button onclick="invite('${p.name}')">Invite</button>

</div>

`;

}

document.getElementById("players").innerHTML=html;
document.getElementById("onlineCount").innerText=count+" online";

});


window.invite=function(name){

alert("Share room code with "+name);

};


/* CREATE ROOM */

window.createRoom=function(){

let rName=document.getElementById("roomName").value;

if(!rName) return alert("Room name required");

roomId=Math.random().toString(36).slice(2,7);

symbol="X";

set(ref(db,"rooms/"+roomId),{

name:rName,
player1:playerId,
player1name:playerName,
player2:null,
player2name:null,
board:["","","","","","","","",""],
turn:"X"

});

enterRoom(roomId);

};


/* ROOM LIST */

onValue(ref(db,"rooms"),snap=>{

let data=snap.val()||{};
let html="";

for(let id in data){

let r=data[id];
if(!r || !r.name) continue;

let players=1;
if(r.player2) players=2;

html+=`

<div class="room">

${r.name} (${players}/2)

<button onclick="joinRoom('${id}')">Join</button>

</div>

`;

}

document.getElementById("rooms").innerHTML=html;

});


window.joinRoom=function(id){

symbol="O";

update(ref(db,"rooms/"+id),{
player2:playerId,
player2name:playerName
});

enterRoom(id);

};

window.joinByCode=function(){

joinRoom(document.getElementById("joinCode").value);

};


/* ENTER ROOM */

function enterRoom(id){

roomId=id;

document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="flex";

document.getElementById("roomId").innerText=id;

createBoard();

listenRoom();
listenChat();

}


/* BOARD */

function createBoard(){

let html="";

for(let i=0;i<9;i++){

html+=`<div class="cell" onclick="move(${i})"></div>`;

}

document.getElementById("board").innerHTML=html;

}


/* LISTEN ROOM */

function listenRoom(){

onValue(ref(db,"rooms/"+roomId),snap=>{

let r=snap.val();
if(!r) return;

document.getElementById("p1").innerText=r.player1name;
document.getElementById("p2").innerText=r.player2name||"Waiting";

document.getElementById("turn").innerText="Turn: "+r.turn;

let cells=document.getElementsByClassName("cell");

r.board.forEach((v,i)=>{
cells[i].innerText=v;
});

checkWinner(r.board,r);

});

}


/* MOVE */

window.move=function(i){

onValue(ref(db,"rooms/"+roomId),snap=>{

let r=snap.val();
if(!r) return;

if(r.board[i]!=""||r.turn!=symbol) return;

r.board[i]=symbol;
r.turn=(symbol=="X")?"O":"X";

update(ref(db,"rooms/"+roomId),{
board:r.board,
turn:r.turn
});

},{onlyOnce:true});

};


/* WIN */

function checkWinner(board,r){

const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

for(let w of wins){

let[a,b,c]=w;

if(board[a]&&board[a]==board[b]&&board[a]==board[c]){

winner(board[a],r);
return;

}

}

if(board.every(x=>x!="")){
showResult("Draw");
}

}


/* RESULT */

function winner(sym,r){

let name=sym=="X"?r.player1name:r.player2name;

scores[sym]++;

document.getElementById("s1").innerText=scores.X;
document.getElementById("s2").innerText=scores.O;

showResult(name+" Wins!");

}


function showResult(text){

let box=document.getElementById("resultPopup");

box.innerText=text;
box.style.display="block";

let count=3;

let interval=setInterval(()=>{

box.innerText=text+" | Restart in "+count;

count--;

if(count<0){

clearInterval(interval);
box.style.display="none";

update(ref(db,"rooms/"+roomId),{

board:["","","","","","","","",""],
turn:"X"

});

}

},1000);

}


/* CHAT */

function listenChat(){

onValue(ref(db,"chat/"+roomId),snap=>{

let data=snap.val()||{};
let html="";

for(let id in data){

let m=data[id];
if(!m||!m.msg) continue;

html+=`<div><b>${m.name}</b>: ${m.msg}</div>`;

}

document.getElementById("messages").innerHTML=html;

});

}

window.sendMsg=function(){

push(ref(db,"chat/"+roomId),{
name:playerName,
msg:document.getElementById("msg").value
});

document.getElementById("msg").value="";

};


/* LEAVE */

window.leaveRoom=function(){

if(confirm("Leave room?")){

remove(ref(db,"rooms/"+roomId));
location.reload();

}

};

</script>

</body>
</html>
