<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel App Pro</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:420px;
    padding:15px;
}

/* Card UI */
.card{
    background:#1a1a1a;
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* Title */
h2{
    text-align:center;
    margin-bottom:10px;
}

/* Upload button */
.upload-btn{
    display:block;
    text-align:center;
    padding:12px;
    background:#2b2b2b;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.upload-btn:hover{
    background:#3d3d3d;
    transform:scale(1.03);
}

/* Row layout */
.row{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-top:10px;
}

/* Inputs */
input[type="number"]{
    width:100%;
    padding:6px;
    border-radius:6px;
    border:none;
    background:#2a2a2a;
    color:white;
}

/* Small color box */
input[type="color"]{
    width:45px;
    height:35px;
    border:none;
}

/* Buttons */
.buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#3a3a3a;
    color:white;
    cursor:pointer;
    transition:0.2s;
}
button:hover{
    background:#555;
}

/* Canvas */
canvas{
    margin-top:15px;
    width:100%;
    border-radius:10px;
    border:2px solid #333;
}

/* Export screen */
.export-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.export-screen img{
    max-width:95%;
    border:2px solid white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Pixel App Pro</h2>

<label class="upload-btn">
    📁 Import Image
    <input type="file" id="upload" hidden>
</label>

<div class="row">
    <input type="number" id="rows" placeholder="Rows">
    <input type="number" id="cols" placeholder="Cols">
</div>

<div class="row">
    <input type="number" id="gridSize" value="1" min="0" placeholder="Grid">
    <input type="color" id="gridColor" value="#ffffff">
</div>

<div class="buttons">
    <button onclick="pixelate()">Generate</button>
    <button onclick="download()">Export</button>
</div>

<canvas id="canvas"></canvas>

</div>
</div>

<script>
let img = new Image();
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const rowsInput = document.getElementById("rows");
const colsInput = document.getElementById("cols");

// Upload
document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
});

// Load image
img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
};

// Auto ratio sync
rowsInput.addEventListener("input", function(){
    const r = parseInt(this.value);
    if(!r || !img.width) return;
    colsInput.value = Math.round(r * (img.width / img.height));
});

colsInput.addEventListener("input", function(){
    const c = parseInt(this.value);
    if(!c || !img.width) return;
    rowsInput.value = Math.round(c * (img.height / img.width));
});

// Pixel effect
function pixelate(){
    const rows = parseInt(rowsInput.value);
    const cols = parseInt(colsInput.value);

    if(!rows || !cols){
        alert("Enter rows or cols");
        return;
    }

    const temp = document.createElement("canvas");
    const tctx = temp.getContext("2d");

    temp.width = cols;
    temp.height = rows;

    tctx.drawImage(img, 0, 0, cols, rows);

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(temp, 0, 0, cols, rows, 0, 0, canvas.width, canvas.height);

    drawGrid(rows, cols);
}

// Grid
function drawGrid(rows, cols){
    const size = parseInt(document.getElementById("gridSize").value);
    if(size <= 0) return;

    const color = document.getElementById("gridColor").value;

    const w = canvas.width / cols;
    const h = canvas.height / rows;

    ctx.strokeStyle = color;
    ctx.lineWidth = size;

    for(let x=0; x<=cols; x++){
        ctx.beginPath();
        ctx.moveTo(x*w, 0);
        ctx.lineTo(x*w, canvas.height);
        ctx.stroke();
    }

    for(let y=0; y<=rows; y++){
        ctx.beginPath();
        ctx.moveTo(0, y*h);
        ctx.lineTo(canvas.width, y*h);
        ctx.stroke();
    }
}

// Export (APK safe)
function download(){
    const dataURL = canvas.toDataURL("image/png");

    const div = document.createElement("div");
    div.className = "export-screen";

    div.innerHTML = `
        <p>Long press image to save</p>
        <img src="${dataURL}">
        <br><br>
        <button onclick="this.parentElement.remove()">⬅ Back</button>
    `;

    document.body.appendChild(div);
}
</script>

</body>
</html>
