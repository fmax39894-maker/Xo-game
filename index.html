<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist App Pro Max</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#f3e5dc,#f8cdda);
}

/* Toolbar */
#toolbar {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

/* Buttons */
.btn {
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: linear-gradient(45deg,#36d1dc,#5b86e5); }
.delete { background: linear-gradient(45deg,#ff416c,#ff4b2b); }
.style { background: linear-gradient(45deg,#8e2de2,#4a00e0); }
.view { background: linear-gradient(45deg,#11998e,#38ef7d); }

/* Board */
#board {
  margin: 15px;
  padding: 15px;
  background: #ffffffcc;
  border-radius: 20px;
}

/* Grid */
#table {
  display: grid;
  gap: 10px;
}

/* Cell */
.cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cell input {
  width: 18px;
  height: 18px;
}

.text {
  flex: 1;
  border-bottom: 1px solid #999;
  min-height: 20px;
  outline: none;
}

/* Styles */
.dotted { border-bottom: 1px dashed #999; }

.heading {
  grid-column: span 100%;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 3px solid black;
  padding: 10px 0;
}

/* Colors */
#colors {
  display: flex;
  gap: 5px;
}

.color-box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  cursor: pointer;
}

/* Hide toolbar in view mode */
.view-mode #toolbar {
  display: none;
}

/* Mobile */
@media(max-width:600px){
  .btn { padding:6px; font-size:12px; }
}
</style>
</head>

<body>

<div id="toolbar">
  <button class="btn add" onclick="addRow()">Add Row</button>
  <button class="btn add" onclick="addColumn()">Add Column</button>

  <button class="btn delete" onclick="deleteRow()">Delete Row</button>
  <button class="btn delete" onclick="deleteColumn()">Delete Column</button>

  <button class="btn style" onclick="addHeading()">Heading</button>
  <button class="btn style" onclick="toggleBold()">Bold</button>
  <button class="btn style" onclick="toggleDotted()">Line</button>

  <button class="btn style" onclick="resizeRow()">Row Size</button>
  <button class="btn style" onclick="resizeColumn()">Col Size</button>

  <button class="btn view" onclick="toggleView()">View</button>
  <button class="btn view" onclick="downloadImage()">📸 Save</button>

  <!-- Text Colors -->
  <div id="colors">
    <div class="color-box" style="background:red" onclick="setColor('red')"></div>
    <div class="color-box" style="background:blue" onclick="setColor('blue')"></div>
    <div class="color-box" style="background:green" onclick="setColor('green')"></div>
    <div class="color-box" style="background:black" onclick="setColor('black')"></div>
    <div class="color-box" style="background:purple" onclick="setColor('purple')"></div>
  </div>

  <!-- Gradient BG -->
  <select onchange="changeBG(this.value)">
    <option>BG</option>
    <option value="linear-gradient(135deg,#f3e5dc,#f8cdda)">Pink</option>
    <option value="linear-gradient(135deg,#a1c4fd,#c2e9fb)">Blue</option>
    <option value="linear-gradient(135deg,#fbc2eb,#a6c1ee)">Purple</option>
  </select>

  <!-- Custom Gradient -->
  <input type="color" id="g1">
  <input type="color" id="g2">
  <button onclick="customGradient()">Apply Gradient</button>
</div>

<div id="board">
  <div id="table"></div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let rows = 8;
let cols = 4;
let selected = null;

const table = document.getElementById("table");

/* Load saved */
window.onload = () => {
  let saved = localStorage.getItem("data");
  if(saved){
    table.innerHTML = saved;
    attachEvents();
  } else {
    createGrid();
  }
};

/* Save */
function save(){
  localStorage.setItem("data", table.innerHTML);
}

/* Create grid */
function createGrid(){
  table.innerHTML="";
  table.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  for(let i=0;i<rows*cols;i++){
    let cell=document.createElement("div");
    cell.className="cell";

    let cb=document.createElement("input");
    cb.type="checkbox";

    let txt=document.createElement("div");
    txt.className="text";
    txt.contentEditable=true;

    txt.onclick=()=>selected=txt;
    txt.oninput=save;

    cell.appendChild(cb);
    cell.appendChild(txt);
    table.appendChild(cell);
  }
}

/* Reattach after load */
function attachEvents(){
  document.querySelectorAll(".text").forEach(t=>{
    t.onclick=()=>selected=t;
    t.oninput=save;
  });
}

/* Add/Delete */
function addRow(){ rows++; createGrid(); save();}
function addColumn(){ cols++; createGrid(); save();}

function deleteRow(){
  if(confirm("Delete row?")){
    if(rows>1) rows--;
    createGrid(); save();
  }
}

function deleteColumn(){
  if(confirm("Delete column?")){
    if(cols>1) cols--;
    createGrid(); save();
  }
}

/* Heading */
function addHeading(){
  let h=document.createElement("div");
  h.className="heading";
  h.contentEditable=true;
  h.innerText="Heading";
  table.prepend(h);
  save();
}

/* Style */
function toggleBold(){
  if(selected){
    selected.style.fontWeight=
    selected.style.fontWeight==="bold"?"normal":"bold";
    save();
  }
}

function toggleDotted(){
  if(selected){
    selected.classList.toggle("dotted");
    save();
  }
}

/* Resize */
function resizeRow(){
  let s=prompt("Row height px:");
  document.querySelectorAll(".cell").forEach(c=>c.style.height=s+"px");
  save();
}

function resizeColumn(){
  let s=prompt("Column width px:");
  table.style.gridTemplateColumns=`repeat(${cols},${s}px)`;
  save();
}

/* Text Color */
function setColor(c){
  if(selected){
    selected.style.color=c;
    save();
  }
}

/* BG */
function changeBG(val){
  document.body.style.background=val;
}

/* Custom gradient */
function customGradient(){
  let c1=document.getElementById("g1").value;
  let c2=document.getElementById("g2").value;
  document.body.style.background=`linear-gradient(135deg,${c1},${c2})`;
}

/* View */
function toggleView(){
  document.body.classList.toggle("view-mode");
}

/* Download image */
function downloadImage(){
  html2canvas(document.getElementById("board")).then(canvas=>{
    let link=document.createElement("a");
    link.download="list.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
