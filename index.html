<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist App Pro Max</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#f3e5dc,#f8cdda);
}

/* Toolbar */
#toolbar {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

/* Buttons */
.btn {
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: linear-gradient(45deg,#36d1dc,#5b86e5); }
.delete { background: linear-gradient(45deg,#ff416c,#ff4b2b); }
.style { background: linear-gradient(45deg,#8e2de2,#4a00e0); }
.view { background: linear-gradient(45deg,#11998e,#38ef7d); }

/* Board */
#board {
  margin: 15px;
  padding: 15px;
  background: #ffffffcc;
  border-radius: 20px;
}

/* Grid */
#table {
  display: grid;
  gap: 10px;
}

.cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.text {
  flex: 1;
  border-bottom: 1px solid #999;
  min-height: 20px;
  outline: none;
}

/* Heading */
.heading {
  font-size: 22px;
  font-weight: bold;
  border-bottom: 3px solid black;
}

/* Side popup */
#popup {
  position: absolute;
  background: white;
  padding: 8px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  display: none;
  gap: 5px;
}

/* Color boxes */
.color {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  cursor: pointer;
}

.view-mode #toolbar { display:none; }
</style>
</head>

<body>

<div id="toolbar">
  <button class="btn add" onclick="addRow()">Add Row</button>
  <button class="btn add" onclick="addColumn()">Add Column</button>

  <button class="btn delete" onclick="deleteRow()">Delete Row</button>
  <button class="btn delete" onclick="deleteColumn()">Delete Column</button>

  <button class="btn style" onclick="addHeading()">Add Heading</button>
  <button class="btn view" onclick="toggleView()">View</button>
</div>

<div id="board">
  <div id="table"></div>
</div>

<!-- Floating popup -->
<div id="popup">
  <div class="color" style="background:red" onclick="setColor('red')"></div>
  <div class="color" style="background:blue" onclick="setColor('blue')"></div>
  <div class="color" style="background:green" onclick="setColor('green')"></div>
  <div class="color" style="background:black" onclick="setColor('black')"></div>

  <button onclick="bold()">B</button>
  <button onclick="line()">Line</button>
</div>

<script>
let rows=6, cols=4;
let selected=null;
let selectedCell=null;

const table=document.getElementById("table");
const popup=document.getElementById("popup");

/* Create grid */
function createGrid(){
  table.innerHTML="";
  table.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  for(let i=0;i<rows*cols;i++){
    let cell=document.createElement("div");
    cell.className="cell";

    let txt=document.createElement("div");
    txt.className="text";
    txt.contentEditable=true;

    txt.onclick=(e)=>{
      selected=txt;
      selectedCell=cell;

      showPopup(e.pageX,e.pageY);
    };

    cell.appendChild(txt);
    table.appendChild(cell);
  }
}
createGrid();

/* Popup */
function showPopup(x,y){
  popup.style.left=x+"px";
  popup.style.top=y+"px";
  popup.style.display="flex";
}

/* Style */
function setColor(c){
  if(selected) selected.style.color=c;
}

function bold(){
  if(selected){
    selected.style.fontWeight=
    selected.style.fontWeight==="bold"?"normal":"bold";
  }
}

function line(){
  if(selected){
    selected.style.borderBottom="2px dashed #000";
  }
}

/* Heading at selected position */
function addHeading(){
  if(selected){
    selected.classList.add("heading");
    selected.innerText="Heading";
  } else {
    alert("Select a cell first");
  }
}

/* Add/Delete */
function addRow(){rows++;createGrid();}
function addColumn(){cols++;createGrid();}
function deleteRow(){if(confirm("Delete row?")){rows--;createGrid();}}
function deleteColumn(){if(confirm("Delete col?")){cols--;createGrid();}}

/* View */
function toggleView(){
  document.body.classList.toggle("view-mode");
}

/* Hide popup on outside click */
document.body.onclick=(e)=>{
  if(!e.target.closest(".text") && !e.target.closest("#popup")){
    popup.style.display="none";
  }
};
</script>

</body>
</html>
