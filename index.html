<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online XO Game</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141E30,#243B55);
color:white;
height:calc(100vh - 2cm);
overflow:hidden;
}

/* SCREENS */

.screen{
display:none;
height:100%;
}

.active{
display:block;
}

/* BUTTONS */

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
color:white;
background:linear-gradient(45deg,#ff512f,#dd2476);
}

button:hover{
opacity:.85;
}

/* INPUT */

input{
padding:8px;
border-radius:6px;
border:none;
outline:none;
}

/* TOP BAR */

.topBar{
display:flex;
justify-content:space-between;
padding:10px;
}

/* PLAYER LIST */

.playerList{
position:absolute;
right:10px;
top:60px;
width:180px;
background:rgba(0,0,0,.4);
padding:10px;
border-radius:10px;
max-height:300px;
overflow:auto;
}

/* ROOM LIST */

.roomList{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:80%;
max-height:220px;
overflow:auto;
}

/* ROOM CARD */

.room{
background:rgba(255,255,255,.1);
margin:6px;
padding:8px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

/* BOARD */

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:6px;
margin:auto;
margin-top:40px;
width:max-content;
}

.cell{
width:100px;
height:100px;
background:rgba(255,255,255,.1);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
border-radius:10px;
}

/* SCORE */

.scoreBoard{
display:flex;
justify-content:space-between;
padding:10px;
font-size:18px;
}

/* CHAT */

.chatBox{
position:absolute;
right:10px;
bottom:60px;
width:230px;
background:rgba(0,0,0,.45);
border-radius:10px;
padding:10px;
backdrop-filter:blur(6px);
box-shadow:0 0 10px rgba(0,0,0,.6);
}

.messages{
height:150px;
overflow-y:auto;
font-size:13px;
margin-bottom:8px;
}

/* WINNER */

.winner{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
display:none;
animation:pop .5s;
}

@keyframes pop{
0%{transform:scale(.5) translate(-50%,-50%)}
100%{transform:scale(1) translate(-50%,-50%)}
}

</style>
</head>

<body>

<!-- LOBBY -->

<div id="lobby" class="screen active">

<div class="topBar">

<div>
<input id="playerName" placeholder="Enter name">
<button onclick="saveName()">Save</button>
</div>

<div id="liveCount">Players:0</div>

</div>


<div class="playerList">
<b>Online Players</b>
<div id="players"></div>
</div>


<div class="roomList">

<div style="margin-bottom:12px">

<input id="joinCode" placeholder="Room code">
<button onclick="joinRoom()">Join</button>

</div>

<div style="margin-bottom:12px">

<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>

</div>

<div id="rooms"></div>

</div>

</div>



<!-- GAME -->

<div id="game" class="screen">

<div class="scoreBoard">

<div id="p1">Player1 : 0</div>

<div>
<button onclick="leaveRoom()">Leave</button>
</div>

<div id="p2">Player2 : 0</div>

</div>

<div id="turnInfo" style="text-align:center">Turn:</div>

<div class="board" id="board"></div>

<div class="winner" id="winner"></div>

<div class="chatBox">

<div class="messages" id="messages"></div>

<div style="display:flex;gap:6px;">
<input id="msgInput" style="flex:1">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>



<script>

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyDsZWTk-iDl6YXJ7LIOWgDEzOg8b4u41ZQ",
  authDomain: "xo11-936a9.firebaseapp.com",
  databaseURL: "https://xo11-936a9-default-rtdb.firebaseio.com",
  projectId: "xo11-936a9",
  storageBucket: "xo11-936a9.firebasestorage.app",
  messagingSenderId: "905765012758",
  appId: "1:905765012758:web:f5f274d67ab8d812c2fc37"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();



/* VARIABLES */

let playerId="p"+Math.random().toString(36).substr(2,9)

let name=""

let currentRoom=null

let symbol=""

let board=["","","","","","","","",""]

let scores={X:0,O:0}



/* SAVE NAME */

function saveName(){

name=document.getElementById("playerName").value

if(!name)return alert("Enter name")

localStorage.setItem("xo_name",name)

goOnline()

}



/* LOAD NAME */

window.onload=()=>{

let n=localStorage.getItem("xo_name")

if(n){

name=n

goOnline()

}

buildBoard()

}



/* ONLINE PRESENCE */

function goOnline(){

db.ref("players/"+playerId).set({

name:name,

time:Date.now()

})

db.ref("players/"+playerId).onDisconnect().remove()

}



/* PLAYER LIST */

db.ref("players").on("value",snap=>{

let p=snap.val()||{}

let html=""

let count=0

for(let id in p){

count++

html+=`

<div>

${p[id].name}

<button onclick="invite('${id}')">Invite</button>

</div>

`

}

document.getElementById("players").innerHTML=html

document.getElementById("liveCount").innerText="Players:"+count

})



/* CREATE ROOM */

function createRoom(){

let rname=document.getElementById("roomName").value

if(!rname)return alert("Room name required")

let id="r"+Date.now()

currentRoom=id

symbol="X"

db.ref("rooms/"+id).set({

name:rname,

created:Date.now(),

players:{

[playerId]:{

name:name,

symbol:"X"

}

},

board:["","","","","","","","",""],

turn:"X",

scoreX:0,

scoreO:0

})

enterRoom(id)

}



/* ROOM LIST */

db.ref("rooms").on("value",snap=>{

let r=snap.val()||{}

let html=""

let now=Date.now()

for(let id in r){

let room=r[id]

if(now-room.created>3600000)continue

let count=Object.keys(room.players||{}).length

html+=`

<div class="room">

${room.name} (${count}/2)

<button onclick="enterRoom('${id}')">Join</button>

</div>

`

}

document.getElementById("rooms").innerHTML=html

})



/* ENTER ROOM */

function enterRoom(id){

db.ref("rooms/"+id+"/players/"+playerId).once("value").then(s=>{

if(!s.exists()){

db.ref("rooms/"+id+"/players/"+playerId).set({

name:name,

symbol:"O"

})

symbol="O"

}

})

currentRoom=id

document.getElementById("lobby").classList.remove("active")

document.getElementById("game").classList.add("active")

listenRoom()

}



/* BOARD */

function buildBoard(){

let html=""

for(let i=0;i<9;i++){

html+=`<div class="cell" onclick="move(${i})" id="c${i}"></div>`

}

document.getElementById("board").innerHTML=html

}



/* MOVE */

function move(i){

if(board[i]!="")return

db.ref("rooms/"+currentRoom).once("value").then(s=>{

let data=s.val()

if(data.turn!=symbol)return

board[i]=symbol

db.ref("rooms/"+currentRoom+"/board").set(board)

db.ref("rooms/"+currentRoom+"/turn").set(symbol=="X"?"O":"X")

checkWinner()

})

}



/* LISTEN ROOM */

function listenRoom(){

db.ref("rooms/"+currentRoom).on("value",snap=>{

let d=snap.val()

if(!d)return

board=d.board

for(let i=0;i<9;i++){

document.getElementById("c"+i).innerText=board[i]

}

document.getElementById("turnInfo").innerText="Turn:"+d.turn

})

listenChat()

}



/* WINNER */

function checkWinner(){

const w=[

[0,1,2],[3,4,5],[6,7,8],

[0,3,6],[1,4,7],[2,5,8],

[0,4,8],[2,4,6]

]

for(let a of w){

let b=a.map(i=>board[i])

if(b[0]&&b[0]==b[1]&&b[1]==b[2]){

showWinner(b[0])

return

}

}

if(!board.includes(""))showWinner("draw")

}



/* WINNER SHOW */

function showWinner(w){

let text=""

if(w=="draw")text="Draw"

else{

text=w+" Wins"

scores[w]++

updateScore()

}

let box=document.getElementById("winner")

box.innerText=text

box.style.display="block"

setTimeout(()=>{

restart()

box.style.display="none"

},3000)

}



/* SCORE */

function updateScore(){

document.getElementById("p1").innerText="X : "+scores.X

document.getElementById("p2").innerText="O : "+scores.O

}



/* RESTART */

function restart(){

board=["","","","","","","","",""]

db.ref("rooms/"+currentRoom+"/board").set(board)

}



/* LEAVE */

function leaveRoom(){

if(!confirm("Leave room?"))return

db.ref("rooms/"+currentRoom+"/players/"+playerId).remove()

db.ref("rooms/"+currentRoom+"/players").once("value").then(s=>{

if(!s.exists())db.ref("rooms/"+currentRoom).remove()

})

location.reload()

}



/* CHAT */

function sendMsg(){

let m=document.getElementById("msgInput").value

if(!m)return

db.ref("rooms/"+currentRoom+"/chat").push({

name:name,

msg:m

})

document.getElementById("msgInput").value=""

}



function listenChat(){

db.ref("rooms/"+currentRoom+"/chat").on("value",snap=>{

let c=snap.val()||{}

let html=""

for(let id in c){

html+=`<div><b>${c[id].name}:</b> ${c[id].msg}</div>`

}

document.getElementById("messages").innerHTML=html

})

}



/* INVITE */

function invite(id){

db.ref("invites/"+id).set({

from:playerId,

name:name

})

alert("Invite sent")

}



db.ref("invites/"+playerId).on("value",snap=>{

let d=snap.val()

if(!d)return

if(confirm(d.name+" invited you")){

createRoom()

}

db.ref("invites/"+playerId).remove()

})

</script>

</body>
</html>
