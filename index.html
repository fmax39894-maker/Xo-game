<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>XO Online Pro</title>

<style>

/* ===== GLOBAL ===== */

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
height:100vh;
overflow:hidden;
}

/* ===== BUTTONS ===== */

button{
border:none;
padding:8px 14px;
border-radius:10px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
}

button:hover{
opacity:0.85;
}

/* ===== INPUT ===== */

input{
padding:8px;
border-radius:8px;
border:none;
outline:none;
}

/* ===== LOBBY ===== */

#lobby{
display:flex;
flex-direction:column;
height:100vh;
}

.lobbyHeader{
display:flex;
justify-content:space-between;
padding:10px;
background:#00000066;
}

.lobbyMain{
flex:1;
display:flex;
overflow:hidden;
}

/* PLAYERS */

.playersPanel{
width:35%;
background:#00000055;
padding:10px;
overflow:auto;
}

.playerItem{
display:flex;
justify-content:space-between;
background:#ffffff11;
margin-bottom:6px;
padding:6px;
border-radius:6px;
}

/* ROOMS */

.roomsPanel{
flex:1;
padding:10px;
overflow:auto;
}

.roomItem{
display:flex;
justify-content:space-between;
background:#ffffff11;
margin-bottom:6px;
padding:6px;
border-radius:6px;
}

/* FOOTER */

.lobbyFooter{
display:flex;
justify-content:space-between;
padding:10px;
background:#00000066;
}

/* ===== GAME SCREEN ===== */

#game{
display:none;
flex-direction:column;
height:100vh;
}

.gameHeader{
display:flex;
justify-content:space-between;
padding:10px;
background:#00000066;
}

.playerBox{
text-align:center;
}

.turnIndicator{
font-size:20px;
margin:5px;
}

/* BOARD */

.board{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

.cell{
background:#ffffff22;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
}

/* WIN EFFECT */

.win{
background:#00ff88 !important;
animation:flash 0.4s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* CHAT */

.chat{
height:180px;
background:#00000066;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:6px;
font-size:14px;
}

.chatInput{
display:flex;
}

.chatInput input{
flex:1;
}

</style>

</head>
<body>


<!-- ================= LOBBY ================= -->

<div id="lobby">

<div class="lobbyHeader">

<input id="nameInput" placeholder="Enter your name">

<div>

<input id="roomNameInput" placeholder="Room name">
<button id="createRoomBtn">Create Room</button>

</div>

</div>


<div class="lobbyMain">

<div class="playersPanel">

<h3>Online Players</h3>
<div id="playersList"></div>

</div>


<div class="roomsPanel">

<h3>Live Rooms</h3>
<div id="roomsList"></div>

</div>

</div>


<div class="lobbyFooter">

<div>

<input id="roomCodeInput" placeholder="Join by code">
<button id="joinCodeBtn">Join</button>

</div>

<span id="onlineCount">0 online</span>

</div>

</div>


<!-- ================= GAME ================= -->

<div id="game">

<div class="gameHeader">

<div class="playerBox">

<div id="p1Name">Player1</div>
Score: <span id="p1Score">0</span>

</div>


<div>

Room: <span id="roomCodeDisplay"></span>

<br>

<button id="restartBtn">Restart</button>
<button id="leaveBtn">Leave</button>

</div>


<div class="playerBox">

<div id="p2Name">Player2</div>
Score: <span id="p2Score">0</span>

</div>

</div>

<h2 class="turnIndicator" id="turnIndicator"></h2>

<div class="board" id="board"></div>


<div class="chat">

<div class="messages" id="chatMessages"></div>

<div class="chatInput">

<input id="chatInput">
<button id="sendChatBtn">Send</button>

</div>

</div>

</div>



<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getDatabase,ref,set,onValue,update,push,remove} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* ================= FIREBASE CONFIG ================= */

const firebaseConfig={
apiKey: "AIzaSyA-ZZDjD7gKPYQedUZiTLSBMMyY6oZJT7g",
  authDomain: "xo-online-771de.firebaseapp.com",
  databaseURL: "https://xo-online-771de-default-rtdb.firebaseio.com",
  projectId: "xo-online-771de"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);


/* ================= GLOBAL STATE ================= */

let playerId=Math.random().toString(36).slice(2);
let currentRoom=null;
let playerSymbol=null;

let scores={
X:0,
O:0
};


/* ================= ONLINE SYSTEM ================= */

function goOnline(){

const name=document.getElementById("nameInput").value || "Player";

set(ref(db,"online/"+playerId),{
name:name
});

}

setTimeout(goOnline,800);


/* ================= ONLINE PLAYERS ================= */

onValue(ref(db,"online"),snap=>{

const data=snap.val()||{};
let html="";
let count=0;

for(const id in data){

const p=data[id];
if(!p || !p.name) continue;

count++;

html+=`
<div class="playerItem">
${p.name}
<button onclick="invitePlayer('${p.name}')">Invite</button>
</div>
`;

}

document.getElementById("playersList").innerHTML=html;
document.getElementById("onlineCount").innerText=count+" online";

});


/* ================= INVITE ================= */

window.invitePlayer=function(name){

alert("Share room code with "+name);

};


/* ================= CREATE ROOM ================= */

document.getElementById("createRoomBtn").onclick=function(){

const roomName=document.getElementById("roomNameInput").value.trim();
const playerName=document.getElementById("nameInput").value.trim();

if(!roomName){
alert("Room name required");
return;
}

const roomId=Math.random().toString(36).slice(2,7);

set(ref(db,"rooms/"+roomId),{

name:roomName,

player1:playerId,
player1name:playerName,

player2:null,
player2name:null,

board:["","","","","","","","",""],

turn:"X"

});

enterRoom(roomId);

};


/* ================= ROOMS LIST ================= */

onValue(ref(db,"rooms"),snap=>{

const rooms=snap.val()||{};
let html="";

for(const id in rooms){

const r=rooms[id];

if(!r || !r.name) continue;

let players=1;
if(r.player2) players=2;

html+=`

<div class="roomItem">

${r.name} (${players}/2)

<button onclick="joinRoom('${id}')">Join</button>

</div>

`;

}

document.getElementById("roomsList").innerHTML=html;

});


window.joinRoom=function(id){

const playerName=document.getElementById("nameInput").value;

update(ref(db,"rooms/"+id),{

player2:playerId,
player2name:playerName

});

enterRoom(id);

};


/* ================= JOIN BY CODE ================= */

document.getElementById("joinCodeBtn").onclick=function(){

const code=document.getElementById("roomCodeInput").value;
joinRoom(code);

};


/* ================= ENTER ROOM ================= */

function enterRoom(id){

currentRoom=id;

document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="flex";

document.getElementById("roomCodeDisplay").innerText=id;

listenRoom();
listenChat();

}


/* ================= LISTEN ROOM ================= */

function listenRoom(){

onValue(ref(db,"rooms/"+currentRoom),snap=>{

const room=snap.val();
if(!room) return;

document.getElementById("p1Name").innerText=room.player1name;
document.getElementById("p2Name").innerText=room.player2name||"Waiting";

playerSymbol=(room.player1==playerId)?"X":"O";

drawBoard(room.board);

document.getElementById("turnIndicator").innerText="Turn: "+room.turn;

});

}


/* ================= DRAW BOARD ================= */

function drawBoard(board){

let html="";

for(let i=0;i<9;i++){

html+=`
<div class="cell" onclick="makeMove(${i})">
${board[i]}
</div>
`;

}

document.getElementById("board").innerHTML=html;

}


/* ================= MOVE ================= */

window.makeMove=function(i){

const roomRef=ref(db,"rooms/"+currentRoom);

onValue(roomRef,snap=>{

const room=snap.val();
if(!room) return;

if(room.board[i]!="") return;
if(room.turn!=playerSymbol) return;

room.board[i]=playerSymbol;

room.turn=(playerSymbol=="X")?"O":"X";

update(roomRef,{
board:room.board,
turn:room.turn
});

checkWin(room.board);

},{onlyOnce:true});

};


/* ================= WIN CHECK ================= */

function checkWin(b){

const winPatterns=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

for(const p of winPatterns){

if(b[p[0]] && b[p[0]]==b[p[1]] && b[p[1]]==b[p[2]]){

winner(b[p[0]]);
return;

}

}

}


/* ================= WINNER ================= */

function winner(sym){

scores[sym]++;

document.getElementById("p1Score").innerText=scores["X"];
document.getElementById("p2Score").innerText=scores["O"];

alert(sym+" wins!");

update(ref(db,"rooms/"+currentRoom),{

board:["","","","","","","","",""],
turn:"X"

});

}


/* ================= CHAT ================= */

function listenChat(){

onValue(ref(db,"chat/"+currentRoom),snap=>{

const data=snap.val()||{};
let html="";

for(const id in data){

const m=data[id];
if(!m || !m.msg) continue;

html+=`<div><b>${m.name}</b>: ${m.msg}</div>`;

}

document.getElementById("chatMessages").innerHTML=html;

});

}


document.getElementById("sendChatBtn").onclick=function(){

const text=document.getElementById("chatInput").value;

push(ref(db,"chat/"+currentRoom),{

name:document.getElementById("nameInput").value,
msg:text

});

document.getElementById("chatInput").value="";

};


/* ================= RESTART ================= */

document.getElementById("restartBtn").onclick=function(){

update(ref(db,"rooms/"+currentRoom),{

board:["","","","","","","","",""],
turn:"X"

});

};


/* ================= LEAVE ================= */

document.getElementById("leaveBtn").onclick=function(){

if(confirm("Leave room?")){

remove(ref(db,"rooms/"+currentRoom));
location.reload();

}

};

</script>

</body>
</html>
