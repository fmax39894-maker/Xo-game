<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist App Pro Max</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#f3e5dc,#f8cdda);
}

/* Toolbar */
#toolbar {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

/* Buttons */
.btn {
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

/* Button gradients */
.add { background: linear-gradient(45deg,#36d1dc,#5b86e5); }
.delete { background: linear-gradient(45deg,#ff416c,#ff4b2b); }
.style { background: linear-gradient(45deg,#8e2de2,#4a00e0); }
.view { background: linear-gradient(45deg,#11998e,#38ef7d); }

/* Download animation */
.download {
  background: linear-gradient(45deg,#ff9a9e,#fad0c4);
  position: relative;
  overflow: hidden;
}

.download.loading {
  pointer-events: none;
  opacity: 0.7;
}

.download.loading::after {
  content: "Saving...";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 12px;
}

/* Board */
#board {
  margin: 15px;
  padding: 15px;
  background: #ffffffcc;
  border-radius: 20px;
}

/* Grid */
#table {
  display: grid;
  gap: 10px;
}

/* Cell */
.cell {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cell input {
  width: 18px;
  height: 18px;
}

.text {
  flex: 1;
  border-bottom: 1px solid #999;
  min-height: 20px;
  outline: none;
}

.dotted { border-bottom: 1px dashed #999; }

.heading {
  grid-column: span 100%;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 3px solid black;
  padding: 10px 0;
}

.view-mode #toolbar { display: none; }

#colors {
  display: flex;
  gap: 5px;
}

.color-box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="toolbar">
  <button class="btn add" onclick="addRow()">Add Row</button>
  <button class="btn add" onclick="addColumn()">Add Column</button>

  <button class="btn delete" onclick="deleteRow()">Delete Row</button>
  <button class="btn delete" onclick="deleteColumn()">Delete Column</button>

  <button class="btn style" onclick="addHeading()">Heading</button>
  <button class="btn style" onclick="toggleBold()">Bold</button>
  <button class="btn style" onclick="toggleDotted()">Line</button>

  <button class="btn view" onclick="toggleView()">View</button>

  <button id="downloadBtn" class="btn download" onclick="downloadImage()">📸 Download</button>

  <div id="colors">
    <div class="color-box" style="background:red" onclick="setColor('red')"></div>
    <div class="color-box" style="background:blue" onclick="setColor('blue')"></div>
    <div class="color-box" style="background:green" onclick="setColor('green')"></div>
    <div class="color-box" style="background:black" onclick="setColor('black')"></div>
  </div>
</div>

<div id="board">
  <div id="table"></div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let rows = 6, cols = 4, selected=null;
const table=document.getElementById("table");

function createGrid(){
  table.innerHTML="";
  table.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  for(let i=0;i<rows*cols;i++){
    let cell=document.createElement("div");
    cell.className="cell";

    let cb=document.createElement("input");
    cb.type="checkbox";

    let txt=document.createElement("div");
    txt.className="text";
    txt.contentEditable=true;

    txt.onclick=()=>selected=txt;

    cell.append(cb,txt);
    table.appendChild(cell);
  }
}
createGrid();

/* Basic */
function addRow(){rows++;createGrid();}
function addColumn(){cols++;createGrid();}
function deleteRow(){if(confirm("Delete row?")){rows--;createGrid();}}
function deleteColumn(){if(confirm("Delete column?")){cols--;createGrid();}}

function addHeading(){
  let h=document.createElement("div");
  h.className="heading";
  h.contentEditable=true;
  h.innerText="Heading";
  table.prepend(h);
}

function toggleBold(){
  if(selected){
    selected.style.fontWeight=
    selected.style.fontWeight==="bold"?"normal":"bold";
  }
}

function toggleDotted(){
  if(selected) selected.classList.toggle("dotted");
}

function setColor(c){
  if(selected) selected.style.color=c;
}

/* 🔥 FIXED DOWNLOAD */
function downloadImage(){
  const btn=document.getElementById("downloadBtn");
  btn.classList.add("loading");

  html2canvas(document.getElementById("board")).then(canvas=>{
    
    canvas.toBlob(function(blob){
      const link=document.createElement("a");

      const fileName = "Checklist_" + new Date().getTime() + ".png";

      link.href=URL.createObjectURL(blob);
      link.download=fileName;
      link.click();

      /* Mobile visibility fix */
      setTimeout(()=>{
        btn.classList.remove("loading");
        alert("Saved! Check Downloads or Files app 📂");
      },1000);

    }, "image/png");
  });
}

/* View */
function toggleView(){
  document.body.classList.toggle("view-mode");
}
</script>

</body>
</html>
