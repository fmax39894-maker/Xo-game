<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checklist App Pro Max</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#f3e5dc,#f8cdda);
}

/* Toolbar */
#toolbar {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

/* Buttons */
.btn {
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: linear-gradient(45deg,#36d1dc,#5b86e5); }
.delete { background: linear-gradient(45deg,#ff416c,#ff4b2b); }
.style { background: linear-gradient(45deg,#8e2de2,#4a00e0); }
.view { background: linear-gradient(45deg,#11998e,#38ef7d); }

/* Board */
#board {
  margin: 15px;
  padding: 15px;
  background: #ffffffcc;
  border-radius: 20px;
}

/* Grid */
#table {
  display: grid;
  gap: 10px;
}

/* Cell */
.cell {
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}

.cell input {
  width: 18px;
  height: 18px;
}

.text {
  flex: 1;
  border-bottom: 1px solid #999;
  min-height: 20px;
  outline: none;
}

.heading {
  font-size: 22px;
  font-weight: bold;
  border-bottom: 3px solid black;
}

/* Popup color panel */
#colorPopup {
  position: fixed;
  right: 10px;
  top: 100px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  display: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.color-box {
  width: 25px;
  height: 25px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
  display: inline-block;
}

.view-mode #toolbar { display: none; }
</style>
</head>

<body>

<div id="toolbar">
  <button class="btn add" onclick="addRow()">Add Row</button>
  <button class="btn add" onclick="addColumn()">Add Column</button>

  <button class="btn delete" onclick="deleteRow()">Delete Row</button>
  <button class="btn delete" onclick="deleteColumn()">Delete Column</button>

  <button class="btn style" onclick="addHeading()">Add Heading</button>
  <button class="btn style" onclick="toggleBold()">Bold</button>

  <button class="btn view" onclick="toggleView()">View</button>
</div>

<div id="board">
  <div id="table"></div>
</div>

<!-- 🎨 Popup -->
<div id="colorPopup">
  <div class="color-box" style="background:red" onclick="setColor('red')"></div>
  <div class="color-box" style="background:blue" onclick="setColor('blue')"></div>
  <div class="color-box" style="background:green" onclick="setColor('green')"></div>
  <div class="color-box" style="background:black" onclick="setColor('black')"></div>
  <div class="color-box" style="background:purple" onclick="setColor('purple')"></div>
</div>

<script>
let rows = 6, cols = 4;
let selectedText = null;
let selectedCell = null;

const table = document.getElementById("table");

function createGrid(){
  table.innerHTML="";
  table.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  for(let i=0;i<rows*cols;i++){
    let cell=document.createElement("div");
    cell.className="cell";

    let cb=document.createElement("input");
    cb.type="checkbox";

    let txt=document.createElement("div");
    txt.className="text";
    txt.contentEditable=true;

    txt.onclick=(e)=>{
      selectedText=txt;
      selectedCell=cell;
      showPopup(e);
    };

    cell.append(cb,txt);
    table.appendChild(cell);
  }
}
createGrid();

/* Add/Delete */
function addRow(){rows++;createGrid();}
function addColumn(){cols++;createGrid();}
function deleteRow(){if(confirm("Delete row?")){rows--;createGrid();}}
function deleteColumn(){if(confirm("Delete col?")){cols--;createGrid();}}

/* 🔥 Heading at selected position */
function addHeading(){
  if(selectedCell){
    selectedCell.innerHTML="";
    let h=document.createElement("div");
    h.className="heading";
    h.contentEditable=true;
    h.innerText="Heading";
    selectedCell.appendChild(h);
  } else {
    alert("Select a cell first");
  }
}

/* Bold */
function toggleBold(){
  if(selectedText){
    selectedText.style.fontWeight=
    selectedText.style.fontWeight==="bold"?"normal":"bold";
  }
}

/* 🎨 Popup */
function showPopup(e){
  let popup=document.getElementById("colorPopup");
  popup.style.display="block";
}

/* Color */
function setColor(c){
  if(selectedText){
    selectedText.style.color=c;
  }
}

/* View */
function toggleView(){
  document.body.classList.toggle("view-mode");
}
</script>

</body>
</html>
