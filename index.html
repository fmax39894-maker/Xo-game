<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Online Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#1f1c2c,#928dab);
color:white;
text-align:center;
}

/* Top bar */
.topBar{
display:flex;
justify-content:space-between;
padding:10px;
background:linear-gradient(90deg,#ff512f,#dd2476);
}

/* Board */
.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:8px;
justify-content:center;
margin:20px auto;
}

.cell{
width:100px;
height:100px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
border-radius:12px;
background:linear-gradient(145deg,#232526,#414345);
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
}

#roomsList{
position:fixed;
bottom:0;
width:100%;
background:#111;
max-height:150px;
overflow:auto;
padding:5px;
}

.roomItem{
display:flex;
justify-content:space-between;
padding:5px;
margin:3px 0;
background:#333;
border-radius:6px;
}

#messages{
height:100px;
overflow:auto;
background:#222;
margin:10px;
padding:5px;
border-radius:6px;
text-align:left;
}
</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div id="lobby">

<div class="topBar">
<div>
Enter Name:
<input id="playerName">
</div>
<div>
Live Players: <span id="liveCount">0</span>
</div>
</div>

<h2>XO Online</h2>

<button onclick="createRoom()">Create Room</button>

<div id="roomsList"></div>

</div>

<!-- GAME SCREEN -->
<div id="game" style="display:none">

<div class="topBar">
<div id="player1"></div>
<div>Room: <span id="roomIdDisplay"></span></div>
<div id="player2"></div>
</div>

<div id="board" class="board"></div>

<h3 id="status"></h3>

<div id="messages"></div>
<input id="chatInput">
<button onclick="sendMessage()">Send</button>

<br>
<button onclick="leaveRoom()">Leave</button>

</div>

<script>

/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
var firebaseConfig = {
  apiKey: "AIzaSyA-ZZDjD7gKPYQedUZiTLSBMMyY6oZJT7g",
  authDomain: "xo-online-771de.firebaseapp.com",
  databaseURL: "https://xo-online-771de-default-rtdb.firebaseio.com",
  projectId: "xo-online-771de",
  storageBucket: "xo-online-771de.firebasestorage.app",
  messagingSenderId: "100258209174",
  appId: "1:100258209174:web:540c143efd3502dfad91b7"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let playerName="";
let roomId="";
let symbol="";
let currentTurn="X";

/* Track live players */
let userRef = db.ref("onlineUsers").push();
userRef.set(true);
userRef.onDisconnect().remove();

db.ref("onlineUsers").on("value",snap=>{
document.getElementById("liveCount").innerText=snap.numChildren();
});

/* Create Room */
function createRoom(){
playerName=document.getElementById("playerName").value;
if(!playerName) return alert("Enter name");

roomId="room_"+Math.floor(Math.random()*100000);
symbol="X";

db.ref("rooms/"+roomId).set({
player1:playerName,
player2:"",
board:["","","","","","","","",""],
turn:"X"
});

openGame();
}

/* Show live rooms */
db.ref("rooms").on("value",snap=>{
let list=document.getElementById("roomsList");
list.innerHTML="";
snap.forEach(room=>{
let data=room.val();
if(data.player2==""){
let div=document.createElement("div");
div.className="roomItem";
div.innerHTML=`
<span>${room.key}</span>
<button onclick="joinRoom('${room.key}')">Join</button>
`;
list.appendChild(div);
}
});
});

/* Join Room */
function joinRoom(id){
playerName=document.getElementById("playerName").value;
if(!playerName) return alert("Enter name");

roomId=id;
symbol="O";

db.ref("rooms/"+roomId+"/player2").set(playerName);
openGame();
}

/* Open Game */
function openGame(){
document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("roomIdDisplay").innerText=roomId;

let boardDiv=document.getElementById("board");
boardDiv.innerHTML="";
for(let i=0;i<9;i++){
let cell=document.createElement("div");
cell.className="cell";
cell.onclick=()=>makeMove(i);
boardDiv.appendChild(cell);
}

listenRoom();
}

/* Listen room changes */
function listenRoom(){
db.ref("rooms/"+roomId).on("value",snap=>{
let data=snap.val();
if(!data) return;

document.getElementById("player1").innerText=data.player1+" (X)";
document.getElementById("player2").innerText=data.player2+" (O)";
currentTurn=data.turn;

let cells=document.getElementsByClassName("cell");
data.board.forEach((val,i)=>{
cells[i].innerText=val;
});
});
}

/* Make move */
function makeMove(i){
if(currentTurn!==symbol) return;

db.ref("rooms/"+roomId).once("value",snap=>{
let data=snap.val();
if(data.board[i]!="") return;

data.board[i]=symbol;
data.turn=(symbol=="X")?"O":"X";

db.ref("rooms/"+roomId).update({
board:data.board,
turn:data.turn
});
});
}

/* Chat */
function sendMessage(){
let msg=document.getElementById("chatInput").value;
if(!msg) return;

db.ref("rooms/"+roomId+"/chat").push({
name:playerName,
text:msg
});
document.getElementById("chatInput").value="";
}

db.ref("rooms").on("child_added",snap=>{
let id=snap.key;
db.ref("rooms/"+id+"/chat").on("child_added",m=>{
if(id==roomId){
let data=m.val();
let div=document.createElement("div");
div.innerText=data.name+": "+data.text;
document.getElementById("messages").appendChild(div);
}
});
});

/* Leave */
function leaveRoom(){
db.ref("rooms/"+roomId).remove();
location.reload();
}

</script>

</body>
</html>
