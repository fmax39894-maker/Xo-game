<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>XO Online</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
height:100vh;
overflow:hidden;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
margin:5px;
}

input{
padding:8px;
border:none;
border-radius:6px;
margin:5px;
}

/* LOBBY */

#lobby{
display:flex;
flex-direction:column;
height:100vh;
}

.listBox{
background:#00000055;
margin:10px;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
}

.listItem{
display:flex;
justify-content:space-between;
padding:6px;
margin-bottom:6px;
background:#ffffff11;
border-radius:6px;
}

/* GAME */

#game{
display:none;
flex-direction:column;
height:100vh;
}

.gameTop{
display:flex;
justify-content:space-between;
padding:10px;
background:#00000066;
}

.board{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:15px;
}

.cell{
background:#ffffff22;
border-radius:10px;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

/* CHAT */

#chat{
height:170px;
background:#00000077;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.chatMsg{
max-width:70%;
padding:8px 12px;
border-radius:12px;
margin:5px;
}

.myMsg{
margin-left:auto;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

.otherMsg{
margin-right:auto;
background:linear-gradient(45deg,#36d1dc,#5b86e5);
}

.chatInput{
display:flex;
padding:6px;
}

.chatInput input{
flex:1;
}

#resultPopup{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:20px;
font-size:30px;
border-radius:12px;
display:none;
}

</style>
</head>

<body>

<!-- LOBBY -->

<div id="lobby">

<h2>XO Online</h2>

<input id="nameInput" placeholder="Enter name">
<button onclick="saveName()">Save Name</button>

<h3>Online Players</h3>
<div id="playersList" class="listBox"></div>

<h3>Rooms</h3>
<div id="roomsList" class="listBox"></div>

<input id="roomName" placeholder="Room name">
<button onclick="createRoom()">Create Room</button>

<input id="joinCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

</div>

<!-- GAME -->

<div id="game">

<div class="gameTop">

<div>
<span id="p1"></span>
Score <span id="s1">0</span>
</div>

<div>
Room <span id="roomLabel"></span>
<button onclick="leave()">Leave</button>
</div>

<div>
<span id="p2"></span>
Score <span id="s2">0</span>
</div>

</div>

<h2 id="turn"></h2>

<div id="board" class="board"></div>

<div id="chat">

<div id="messages"></div>

<div class="chatInput">
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

</div>

</div>

<div id="resultPopup"></div>

<script>

/* FIREBASE CONFIG */

var firebaseConfig={
  apiKey: "AIzaSyDsZWTk-iDl6YXJ7LIOWgDEzOg8b4u41ZQ",
  authDomain: "xo11-936a9.firebaseapp.com",
  databaseURL: "https://xo11-936a9-default-rtdb.firebaseio.com",
  projectId: "xo11-936a9"
}

firebase.initializeApp(firebaseConfig)

var db=firebase.database()

/* PLAYER */

var playerId="p"+Math.random().toString(36).substr(2,9)
var playerName=""
var roomId=null
var symbol=""

var scoreX=0
var scoreO=0

/* SAVE NAME AND GO ONLINE */

function saveName(){

playerName=document.getElementById("nameInput").value

localStorage.setItem("xo_name",playerName)

var ref=db.ref("online/"+playerId)

ref.set({
name:playerName
})

ref.onDisconnect().remove()

listenPlayers()

}

/* ONLINE PLAYERS */

function listenPlayers(){

db.ref("online").on("value",snap=>{

let data=snap.val()||{}
let html=""

for(let id in data){

if(id==playerId) continue

html+=`
<div class="listItem">${data[id].name}</div>
`

}

document.getElementById("playersList").innerHTML=html

})

}

/* ROOM LISTENER */

db.ref("rooms").on("value",snap=>{

let data=snap.val()||{}
let html=""
let now=Date.now()

for(let id in data){

let r=data[id]

if(!r) continue

/* remove empty rooms */

if(!r.player1 && !r.player2){
db.ref("rooms/"+id).remove()
continue
}

/* remove old rooms */

if(r.created && now-r.created>300000){
db.ref("rooms/"+id).remove()
continue
}

let count=0
if(r.player1) count++
if(r.player2) count++

let time=new Date(r.created).toLocaleTimeString()

html+=`
<div class="listItem">
<div>
${r.name} (${count}/2)
<br>
<small>${time}</small>
</div>
<button onclick="joinRoomById('${id}')">Join</button>
</div>
`

}

document.getElementById("roomsList").innerHTML=html

})

/* CREATE ROOM */

function createRoom(){

let name=document.getElementById("roomName").value
if(!name) return

let id="r"+Math.random().toString(36).substr(2,6)

db.ref("rooms/"+id).set({

name:name,
player1:playerId,
player1name:playerName,
board:["","","","","","","","",""],
turn:"X",
created:Date.now()

})

startGame(id,"X")

}

/* JOIN ROOM */

function joinRoom(){

let id=document.getElementById("joinCode").value
joinRoomById(id)

}

function joinRoomById(id){

db.ref("rooms/"+id).once("value",snap=>{

let r=snap.val()
if(!r)return

if(r.player2) return alert("Room full")

db.ref("rooms/"+id).update({
player2:playerId,
player2name:playerName
})

startGame(id,"O")

})

}

/* START GAME */

function startGame(id,sym){

roomId=id
symbol=sym

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="flex"

document.getElementById("roomLabel").innerText=id

listenRoom()
listenChat()

}

/* ROOM LISTENER */

function listenRoom(){

db.ref("rooms/"+roomId).on("value",snap=>{

let r=snap.val()
if(!r)return

document.getElementById("p1").innerText=r.player1name||"Player1"
document.getElementById("p2").innerText=r.player2name||"Waiting"

document.getElementById("turn").innerText="Turn : "+r.turn

drawBoard(r.board)

})

}

/* BOARD */

function drawBoard(board){

let html=""

for(let i=0;i<9;i++){
html+=`<div class="cell" onclick="move(${i})">${board[i]}</div>`
}

document.getElementById("board").innerHTML=html

}

/* MOVE */

function move(i){

db.ref("rooms/"+roomId).once("value",snap=>{

let r=snap.val()

if(r.turn!=symbol)return
if(r.board[i]!="")return

r.board[i]=symbol
r.turn=(symbol=="X")?"O":"X"

db.ref("rooms/"+roomId).update({
board:r.board,
turn:r.turn
})

checkWinner(r.board)

})

}

/* WIN */

function checkWinner(b){

let win=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]

for(let w of win){

let[a,c,d]=w

if(b[a] && b[a]==b[c] && b[a]==b[d]){
showResult(b[a]+" Wins")
return
}

}

if(!b.includes("")){
showResult("Draw")
}

}

function showResult(t){

let box=document.getElementById("resultPopup")

box.innerText=t
box.style.display="block"

setTimeout(()=>{

box.style.display="none"

db.ref("rooms/"+roomId).update({
board:["","","","","","","","",""],
turn:"X"
})

},3000)

}

/* CHAT */

function sendMsg(){

let msg=document.getElementById("msg").value

db.ref("rooms/"+roomId+"/chat").push({
name:playerName,
msg:msg
})

document.getElementById("msg").value=""

}

function listenChat(){

db.ref("rooms/"+roomId+"/chat").on("child_added",snap=>{

let d=snap.val()

let div=document.createElement("div")

div.className="chatMsg "+(d.name==playerName?"myMsg":"otherMsg")

div.innerHTML="<b>"+d.name+"</b><br>"+d.msg

let box=document.getElementById("messages")

box.appendChild(div)
box.scrollTop=box.scrollHeight

})

}

/* LEAVE */

function leave(){

db.ref("rooms/"+roomId).once("value",snap=>{

let r=snap.val()

if(r.player1==playerId) r.player1=null
if(r.player2==playerId) r.player2=null

db.ref("rooms/"+roomId).update(r)

})

location.reload()

}

</script>

</body>
</html>
