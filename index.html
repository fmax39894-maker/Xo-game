<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Online Pro</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#1f1c2c,#928dab);
color:white;
text-align:center;
min-height:100vh;
}

.topBar{
display:flex;
justify-content:space-between;
padding:10px;
background:linear-gradient(90deg,#ff512f,#dd2476);
}

h2,h3{
margin:10px 0;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

input{
padding:8px;
border-radius:6px;
border:none;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:8px;
justify-content:center;
margin:20px auto;
}

.cell{
width:100px;
height:100px;
background:linear-gradient(145deg,#232526,#414345);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
border-radius:10px;
cursor:pointer;
}

#roomsList{
position:fixed;
bottom:0;
width:100%;
background:#111;
max-height:150px;
overflow:auto;
padding:10px;
}

.roomItem{
display:flex;
justify-content:space-between;
background:#333;
padding:5px;
margin:5px 0;
border-radius:5px;
}

#messages{
height:120px;
overflow:auto;
background:#222;
padding:5px;
border-radius:6px;
text-align:left;
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">

<div class="topBar">
<div>
<input id="playerName" placeholder="Enter your name">
</div>
<div>
Live Players: <span id="livePlayers">0</span>
</div>
</div>

<h2>XO ONLINE</h2>

<button onclick="createRoom()">Play (Create Room)</button>

<div id="roomsList"></div>

</div>

<!-- GAME SCREEN -->
<div id="game" style="display:none;">

<h3 id="roomIdDisplay"></h3>

<div class="topBar">
<div id="playerXInfo"></div>
<div id="playerOInfo"></div>
</div>

<div id="status"></div>

<div class="board" id="board"></div>

<button id="restartBtn" onclick="restartGame()">Restart</button>
<button onclick="leaveRoom()">Leave</button>

<h3>Chat</h3>
<div id="messages"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
var firebaseConfig = {
  apiKey: "AIzaSyA-ZZDjD7gKPYQedUZiTLSBMMyY6oZJT7g",
  authDomain: "xo-online-771de.firebaseapp.com",
  databaseURL: "https://xo-online-771de-default-rtdb.firebaseio.com",
  projectId: "xo-online-771de",
  storageBucket: "xo-online-771de.firebasestorage.app",
  messagingSenderId: "100258209174",
  appId: "1:100258209174:web:540c143efd3502dfad91b7"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let playerName="";
let roomId="";
let symbol="";
let board=["","","","","","","","",""];
let myTurn=false;
let cooldown=false;

// Create board
const boardDiv=document.getElementById("board");
for(let i=0;i<9;i++){
 let cell=document.createElement("div");
 cell.className="cell";
 cell.onclick=()=>makeMove(i);
 boardDiv.appendChild(cell);
}

// Online counter
const myOnlineId=Math.random().toString(36);
db.ref("onlinePlayers/"+myOnlineId).set(true);
db.ref("onlinePlayers/"+myOnlineId).onDisconnect().remove();

db.ref("onlinePlayers").on("value",snap=>{
 document.getElementById("livePlayers").innerText=snap.numChildren();
});

// Live rooms
db.ref("rooms").on("value",snap=>{
 const rooms=snap.val();
 const list=document.getElementById("roomsList");
 list.innerHTML="<h3>Live Rooms</h3>";
 if(!rooms) return;

 for(let id in rooms){
   list.innerHTML+=`
   <div class="roomItem">
   <span>${id}</span>
   <button onclick="joinRoom('${id}')">Join</button>
   </div>`;
 }
});

function createRoom(){
 playerName=document.getElementById("playerName").value;
 if(!playerName) return alert("Enter your name");

 roomId=Math.random().toString(36).substr(2,6);
 symbol="X";

 db.ref("rooms/"+roomId).set({
   players:{X:playerName},
   board:["","","","","","","","",""],
   turn:"X",
   winner:"",
   score:{X:0,O:0},
   chat:{}
 });

 startGame();
}

function joinRoom(id){
 playerName=document.getElementById("playerName").value;
 if(!playerName) return alert("Enter your name");

 roomId=id;
 symbol="O";

 db.ref("rooms/"+roomId+"/players/O").set(playerName);
 startGame();
}

function startGame(){
 document.getElementById("lobby").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("roomIdDisplay").innerText="Room ID: "+roomId;

 db.ref("rooms/"+roomId).on("value",snap=>{
   const data=snap.val();
   if(!data) return;

   board=data.board;
   updateBoard();

   document.getElementById("playerXInfo").innerText=
     (data.players.X||"") + " (X) : " + data.score.X;

   document.getElementById("playerOInfo").innerText=
     (data.players.O||"Waiting") + " (O) : " + data.score.O;

   myTurn=data.turn===symbol;

   if(data.winner){
     document.getElementById("status").innerText=data.winner+" Wins!";
   }else{
     document.getElementById("status").innerText=
       myTurn?"Your Turn":"Opponent Turn";
   }

   updateChat(data.chat);
 });
}

function makeMove(i){
 if(!myTurn || board[i]!="") return;

 board[i]=symbol;

 let winner=checkWinner(board);

 db.ref("rooms/"+roomId).update({
   board:board,
   turn:symbol==="X"?"O":"X",
   winner:winner
 });

 if(winner){
   db.ref("rooms/"+roomId+"/score/"+winner)
     .transaction(score => (score||0)+1);
 }
}

function updateBoard(){
 document.querySelectorAll(".cell").forEach((c,i)=>{
   c.innerText=board[i];
 });
}

function checkWinner(b){
 const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],
              [1,4,7],[2,5,8],[0,4,8],[2,4,6]];
 for(let w of wins){
  if(b[w[0]]&&b[w[0]]===b[w[1]]&&b[w[1]]===b[w[2]])
   return b[w[0]];
 }
 return "";
}

function restartGame(){
 if(cooldown) return;
 cooldown=true;

 let sec=10;
 const btn=document.getElementById("restartBtn");
 btn.innerText="Cooldown 10s";

 let interval=setInterval(()=>{
  sec--;
  btn.innerText="Cooldown "+sec+"s";
  if(sec<=0){
    clearInterval(interval);
    cooldown=false;
    btn.innerText="Restart";
  }
 },1000);

 db.ref("rooms/"+roomId).update({
   board:["","","","","","","","",""],
   winner:"",
   turn:"X"
 });
}

function sendMessage(){
 const msg=document.getElementById("chatInput").value;
 if(!msg) return;

 db.ref("rooms/"+roomId+"/chat").push({
   name:playerName,
   text:msg
 });

 document.getElementById("chatInput").value="";
}

function updateChat(chat){
 const box=document.getElementById("messages");
 box.innerHTML="";
 if(!chat) return;

 for(let key in chat){
   box.innerHTML+=`<p><b>${chat[key].name}:</b> ${chat[key].text}</p>`;
 }
 box.scrollTop=box.scrollHeight;
}

function leaveRoom(){
 if(confirm("Leave this room?")){
   location.reload();
 }
}

</script>
</body>
</html>
