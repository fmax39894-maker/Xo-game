<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#1e293b;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#nameBtn{
background:#22c55e;
border:none;
padding:8px 15px;
border-radius:20px;
color:white;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#1e293b;
padding:8px;
margin:6px 0;
border-radius:10px;
max-width:75%;
position:relative;
}

.me{
background:#2563eb;
margin-left:auto;
}

.name{
font-size:12px;
opacity:.7;
}

.delete{
position:absolute;
right:6px;
top:6px;
cursor:pointer;
}

.media{
max-width:200px;
margin-top:6px;
border-radius:8px;
cursor:pointer;
}

#sendBar{
display:flex;
padding:8px;
background:#1e293b;
}

#msg{
flex:1;
padding:8px;
border:none;
border-radius:20px;
}

button{
margin-left:5px;
border:none;
padding:8px 12px;
border-radius:20px;
background:#22c55e;
color:white;
}

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>

</head>

<body>

<header>
<h3>Live Chat</h3>
<button id="nameBtn"></button>
</header>

<div id="chat"></div>

<div id="sendBar">
<input id="msg" placeholder="Message">
<input type="file" id="fileInput" hidden>
<button onclick="document.getElementById('fileInput').click()">📎</button>
<button onclick="sendMsg()">Send</button>
</div>

<div id="viewer">
<div id="viewerContent"></div>
<a id="download" download><button>Download</button></a>
<button onclick="closeViewer()">Close</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDsZWTk-iDl6YXJ7LIOWgDEzOg8b4u41ZQ",
  authDomain: "xo11-936a9.firebaseapp.com",
  databaseURL: "https://xo11-936a9-default-rtdb.firebaseio.com",
  projectId: "xo11-936a9",
  storageBucket: "xo11-936a9.firebasestorage.app",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

let name = localStorage.getItem("chatName");

if(!name){
name = prompt("Enter your name");
localStorage.setItem("chatName",name);
}

const nameBtn=document.getElementById("nameBtn");
nameBtn.innerText=name;

nameBtn.onclick=function(){

let n=prompt("Change your name");

if(n){
name=n;
localStorage.setItem("chatName",n);
nameBtn.innerText=n;
}

}

function sendMsg(){

let msg=document.getElementById("msg");

if(msg.value=="") return;

db.ref("messages").push({

name:name,
text:msg.value,
time:Date.now()

});

msg.value="";

}

document.getElementById("fileInput").onchange=function(){

let file=this.files[0];

if(!file) return;

let ref=storage.ref("chatFiles/"+Date.now()+"_"+file.name);

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

db.ref("messages").push({

name:name,
file:url,
type:file.type,
time:Date.now()

});

});

});

}

db.ref("messages").on("child_added",snap=>{

let data=snap.val();
let id=snap.key;

let div=document.createElement("div");
div.className="msg";

if(data.name==name) div.classList.add("me");

div.innerHTML="<div class='name'>"+data.name+"</div>";

if(data.text){

div.innerHTML+="<div>"+data.text+"</div>";

}

if(data.file){

if(data.type.startsWith("image")){

div.innerHTML+="<img src='"+data.file+"' class='media' onclick=\"openViewer('"+data.file+"')\">";

}

else if(data.type.startsWith("video")){

div.innerHTML+="<video src='"+data.file+"' class='media' controls></video>";

}

else if(data.type.startsWith("audio")){

div.innerHTML+="<audio src='"+data.file+"' controls></audio>";

}

else{

div.innerHTML+="<a href='"+data.file+"' target='_blank'>📄 Document</a>";

}

}

if(data.name==name){

let del=document.createElement("span");
del.className="delete";
del.innerHTML="🗑";

del.onclick=function(){

if(confirm("Delete this message?")){
db.ref("messages/"+id).remove();
div.remove();
}

}

div.appendChild(del);

}

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=999999;

});

function openViewer(url){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerContent").innerHTML=
"<img src='"+url+"' style='max-width:100%'>";

document.getElementById("download").href=url;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}

</script>

</body>
</html>
